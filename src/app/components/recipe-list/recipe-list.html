<button [routerLink]="['/recipes', recipes()[0].id]">Show Spaghetti</button>
<button [routerLink]="['/recipes', recipes()[1].id]">Show Salad</button>


<input [(ngModel)]="search" placeholder="search . . .">
@for(foundRecipe of filteredRecipes(); track foundRecipe.id)
{
        <button (click)="setRecipe(foundRecipe)">
          {{ foundRecipe.name }}
        </button>
}
