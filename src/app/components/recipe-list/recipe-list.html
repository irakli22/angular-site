<button (click)="setRecipe(recipes()[0])">Show Spaghetti</button>
<button (click)="setRecipe(recipes()[1])">Show Salad</button>


<input [(ngModel)]="search" placeholder="search . . .">
@for(foundRecipe of filteredRecipes(); track foundRecipe.id)
{
        <button (click)="setRecipe(foundRecipe)">
          {{ foundRecipe.name }}
        </button>
}

<app-recipe-detail [recipe]="recipe()" />
